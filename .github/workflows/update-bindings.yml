name: Update Mopro Android Bindings

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:       # manual trigger

jobs:
  update-bindings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run update_bindings.sh
        run: bash scripts/update_bindings.sh

      - name: Commit updated bindings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            lib/src/main/jniLibs/arm64-v8a/ \
            lib/src/main/kotlin/uniffi/mopro/mopro.kt
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update mopro Android bindings [skip ci]"
            git push
          fi
